# Use root/example as user/password credentials

services:
  db:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: testdb
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql # 数据保存在本地

  adminer:
    image: adminer
    restart: always
    ports:
      - '8080:8080' # 将容器的 8080 端口映射到主机的 8080 端口
    depends_on:
      - db # 确保 Adminer 在 MySQL 启动后再启动

volumes:
  mysql_data:
